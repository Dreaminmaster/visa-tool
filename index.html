<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多国签证申请表 · 填写工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hdr">
    <div class="eu">✈️</div>
    <div><h1>多国签证申请表 · 填写工具</h1><p>为中国公民量身定制 · 填写完成后一键导出官方PDF</p></div>
  </div>

  <!-- 首页：国家选择 -->
  <div class="container" id="landing-page">
    <div class="landing">
      <div class="landing-title">🌍 你要申请哪个国家的签证？</div>
      <div class="landing-sub">选择目的地国家，我们将为你定制表单</div>
      <div class="region-tabs" id="region-tabs"></div>
      <div class="country-grid-landing" id="landing-grid"></div>
    </div>
  </div>

  <!-- 签证类型选择 -->
  <div class="container" id="type-page" style="display:none">
    <button class="back-btn" onclick="backToLanding()">← 重新选择国家</button>
    <div class="selected-country-bar" id="type-country-bar"></div>
    <div id="type-content"></div>
  </div>

  <!-- 申请指南 -->
  <div class="container" id="guide-page" style="display:none">
    <button class="back-btn" onclick="backToTypes()">← 返回选择签证类型</button>
    <div class="selected-country-bar" id="guide-country-bar"></div>
    <div id="guide-content"></div>
  </div>

  <!-- 表单填写 -->
  <div class="container" id="form-page" style="display:none">
    <button class="back-btn" onclick="backToLanding()">← 重新选择国家</button>
    <div class="selected-country-bar" id="selected-country-bar"></div>
    <div class="prog">
      <div class="dot active" id="d1" onclick="go(1)">1</div><div class="ln idle" id="l1"></div>
      <div class="dot idle" id="d2" onclick="go(2)">2</div><div class="ln idle" id="l2"></div>
      <div class="dot idle" id="d3" onclick="go(3)">3</div><div class="ln idle" id="l3"></div>
      <div class="dot idle" id="d4" onclick="go(4)">4</div><div class="ln idle" id="l4"></div>
      <div class="dot idle" id="d5" onclick="go(5)">5</div>
      <span class="slabel" id="slbl">个人信息</span>
    </div>

    <!-- Step 1: 个人基本信息 -->
    <div class="card active" id="s1">
      <div class="ctitle">👤 个人基本信息 <span class="cbadge">第 1–12 项</span></div>
      <div class="grid g2">
        <div class="fg">
          <label><span class="fn">1</span> 姓 Surname <span class="req">*</span></label>
          <input id="f01_surname" type="text" placeholder="护照上的姓，如：ZHANG">
        </div>
        <div class="fg">
          <label><span class="fn">3</span> 名 First name(s) <span class="req">*</span></label>
          <input id="f03_firstname" type="text" placeholder="护照上的名，如：SAN">
        </div>
        <div class="fg full">
          <label><span class="fn">2</span> 出生时姓氏 Surname at birth <span class="req">*</span></label>
          <input id="f02_birth_surname" type="text" placeholder="出生时使用的姓氏">
        </div>
        <div class="fg">
          <label><span class="fn">4</span> 出生日期 Date of birth <span class="req">*</span></label>
          <input id="f04_dob" type="date">
        </div>
        <div class="fg">
          <label><span class="fn">5</span> 出生地 Place of birth <span class="req">*</span></label>
          <input id="f05_birthplace" type="text" placeholder="如：Beijing">
        </div>
        <div class="fg">
          <label><span class="fn">6</span> 出生国 Country of birth <span class="req">*</span></label>
          <input id="f06_birth_country" type="text" placeholder="如：China">
        </div>
        <div class="fg">
          <label><span class="fn">7</span> 现国籍 Current nationality <span class="req">*</span></label>
          <input id="f07_nationality" type="text" placeholder="如：Chinese">
        </div>
        <div class="fg">
          <label>出生时国籍 Nationality at birth</label>
          <input id="f07b_birth_nat" type="text">
        </div>
        <div class="fg">
          <label>其他国籍 Other nationalities</label>
          <input id="f07c_other_nat" type="text">
        </div>
        <div class="fg">
          <label><span class="fn">11</span> 身份证号 National ID <span class="req">*</span></label>
          <input id="f11_national_id" type="text" placeholder="如：110101199001011234">
        </div>
        <div class="fg full">
          <label><span class="fn">8</span> 性别 Sex <span class="req">*</span></label>
          <div class="radios">
            <label class="ri"><input type="radio" name="sex" value="male"> 男 Male</label>
            <label class="ri"><input type="radio" name="sex" value="female"> 女 Female</label>
          </div>
        </div>
        <div class="fg full">
          <label><span class="fn">9</span> 婚姻状况 Marital status <span class="req">*</span></label>
          <div class="radios">
            <label class="ri"><input type="radio" name="marital" value="single"> 未婚 Single</label>
            <label class="ri"><input type="radio" name="marital" value="married"> 已婚 Married</label>
            <label class="ri"><input type="radio" name="marital" value="divorced"> 离婚 Divorced</label>
            <label class="ri"><input type="radio" name="marital" value="widowed"> 丧偶 Widow(er)</label>
          </div>
        </div>
        <div class="fg full">
          <label><span class="fn">12</span> 旅行证件类型 <span class="req">*</span></label>
          <div class="radios">
            <label class="ri"><input type="radio" name="doctype" value="ordinary" checked> 普通护照</label>
            <label class="ri"><input type="radio" name="doctype" value="diplomatic"> 外交护照</label>
            <label class="ri"><input type="radio" name="doctype" value="service"> 公务护照</label>
          </div>
        </div>
      </div>
      <div class="nav"><button class="btn btn-p" onclick="next()">下一步 →</button></div>
    </div>

    <!-- Step 2: 旅行证件 -->
    <div class="card" id="s2">
      <div class="ctitle">📘 旅行证件信息 <span class="cbadge">第 13–16 项</span></div>
      <div class="grid g2">
        <div class="fg">
          <label><span class="fn">13</span> 护照号码 <span class="req">*</span></label>
          <input id="f13_passport_num" type="text" placeholder="如：E12345678">
        </div>
        <div class="fg">
          <label><span class="fn">14</span> 签发日期 <span class="req">*</span></label>
          <input id="f14_issue_date" type="date">
        </div>
        <div class="fg">
          <label><span class="fn">15</span> 有效期至 <span class="req">*</span></label>
          <input id="f15_expiry_date" type="date">
        </div>
        <div class="fg">
          <label><span class="fn">16</span> 签发国 <span class="req">*</span></label>
          <input id="f16_issued_country" type="text" placeholder="如：China">
        </div>
      </div>
      <div class="nav">
        <button class="btn btn-s" onclick="prev()">← 上一步</button>
        <button class="btn btn-p" onclick="next()">下一步 →</button>
      </div>
    </div>

    <!-- Step 3: 联系方式 -->
    <div class="card" id="s3">
      <div class="ctitle">📞 联系方式 <span class="cbadge">第 19 项</span></div>
      <div class="grid g2">
        <div class="fg full">
          <label><span class="fn">19</span> 家庭住址 <span class="req">*</span></label>
          <input id="f19_address" type="text" placeholder="详细住址">
        </div>
        <div class="fg">
          <label>电子邮件 <span class="req">*</span></label>
          <input id="f19_email" type="email" placeholder="example@email.com">
        </div>
        <div class="fg">
          <label>电话号码 <span class="req">*</span></label>
          <input id="f19_phone" type="tel" placeholder="+86 13800138000">
        </div>
      </div>
      <div class="nav">
        <button class="btn btn-s" onclick="prev()">← 上一步</button>
        <button class="btn btn-p" onclick="next()">下一步 →</button>
      </div>
    </div>

    <!-- Step 4: 旅行信息 -->
    <div class="card" id="s4">
      <div class="ctitle">✈️ 旅行信息 <span class="cbadge">第 25–28 项</span></div>
      <div class="grid g2">
        <div class="fg">
          <label><span class="fn">25</span> 主要目的地 <span class="req">*</span></label>
          <input id="f25_main_dest" type="text" placeholder="如：Paris">
        </div>
        <div class="fg">
          <label><span class="fn">26</span> 首入国 <span class="req">*</span></label>
          <input id="f26_first_entry" type="text" placeholder="如：France">
        </div>
        <div class="fg">
          <label><span class="fn">28</span> 入境日期 <span class="req">*</span></label>
          <input id="f28_arrival" type="date">
        </div>
        <div class="fg">
          <label>离境日期 <span class="req">*</span></label>
          <input id="f28_departure" type="date">
        </div>
      </div>
      <div class="nav">
        <button class="btn btn-s" onclick="prev()">← 上一步</button>
        <button class="btn btn-p" onclick="next()">下一步 →</button>
      </div>
    </div>

    <!-- Step 5: 确认导出 -->
    <div class="card" id="s5">
      <div class="ctitle">✅ 确认信息并导出PDF</div>
      <div class="sumbox"><h3>📋 填写摘要</h3><div class="sumgrid" id="sumgrid"></div></div>
      <div class="tip">⚠️ 请检查摘要无误后点击导出</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-dl" id="dl-btn" onclick="generate()">📄 生成并下载PDF</button>
        <button class="btn btn-s" onclick="prev()">← 返回修改</button>
      </div>
    </div>
  </div>

  <div id="ov"><div class="spin"></div><div style="font-size:14px;font-weight:600">正在写入PDF表单字段...</div></div>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="pdf-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
